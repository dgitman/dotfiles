model = "gpt-5.5"
model_reasoning_effort = "medium"
approval_policy = "never"
sandbox_mode = "danger-full-access"

[sandbox_workspace_write]
network_access = true

# Machine-specific [projects."..."] trust stanzas are intentionally omitted.
# Codex repopulates them as you trust each project. Only the root fallback is
# tracked so a fresh machine starts with a sane default.
[projects."/"]
trust_level = "trusted"

[projects."/Users/dgitman/Developer/gmail-takeout-mbox-to-ai"]
trust_level = "trusted"

[projects."/Users/dgitman/Documents/Codex/2026-05-11/check-my-daughter-shira-s-public"]
trust_level = "trusted"

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."slack@openai-curated"]
enabled = true

[plugins."canva@openai-curated"]
enabled = true

[plugins."stripe@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."google-drive@openai-curated"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."notion@openai-curated"]
enabled = true

[plugins."hubspot@openai-curated"]
enabled = true

[mcp_servers.clay-inc-clay-mcp]
url = "https://mcp.clay.earth/mcp"

[desktop]
ambient-suggestions-enabled = true
sansFontSize = 14
codeFontSize = 13
mac-menu-bar-enabled = false
preventSleepWhileRunning = true
keepRemoteControlAwakeWhilePluggedIn = true
git-show-sidebar-pr-icons = false
conversationDetailMode = "STEPS_PROSE"

[desktop.open-in-target-preferences]
global = "fileManager"

[desktop.open-in-target-preferences.perPath]
"/Users/dgitman/Developer/gmail-takeout-mbox-to-ai" = "fileManager"

[features]
js_repl = false
